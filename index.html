<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Aniq! 🎀🦇</title>
    <style>
        :root {
            --kitty-pink: #FFB7C5;
            --kitty-dark-pink: #FF69B4;
            --bat-black: #111111;
            --bat-yellow: #FDE047;
            --text-light: #F3F4F6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bat-black) 50%, var(--kitty-pink) 50%);
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }

        /* Gotham Skyline Background Effect */
        body::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8)), 
                        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20" preserveAspectRatio="none"><path d="M0,20 L0,10 L5,10 L5,5 L10,5 L10,12 L15,12 L15,2 L25,2 L25,15 L30,15 L30,8 L40,8 L40,18 L45,18 L45,4 L55,4 L55,12 L60,12 L60,7 L70,7 L70,15 L75,15 L75,3 L85,3 L85,13 L90,13 L90,9 L100,9 L100,20 Z" fill="%23050505"/></svg>');
            background-size: 100% 100%;
            opacity: 0.4;
            pointer-events: none;
            z-index: 1;
        }

        /* Main Container */
        .card-container {
            background: rgba(17, 17, 17, 0.85);
            border: 4px solid var(--bat-yellow);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(253, 224, 71, 0.3), 0 0 30px rgba(255, 105, 180, 0.4);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
            z-index: 5;
            animation: cardGlow 4s ease-in-out infinite alternate;
        }

        @keyframes cardGlow {
            0% { box-shadow: 0 0 20px rgba(253, 224, 71, 0.2); }
            100% { box-shadow: 0 0 40px rgba(255, 105, 180, 0.5), 0 0 20px rgba(253, 224, 71, 0.4); }
        }

        /* Custom Interactive Header Mashup */
        .mashup-header {
            position: relative;
            height: 100px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .center-logo {
            font-size: 3.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
            user-select: none;
            filter: drop-shadow(0 0 10px rgba(253, 224, 71, 0.5));
        }

        .center-logo:hover {
            transform: scale(1.2) rotate(10deg);
        }

        h1 {
            color: var(--bat-yellow);
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 3px 3px var(--kitty-dark-pink);
        }

        h2 {
            color: var(--kitty-pink);
            font-size: 1.3rem;
            margin-bottom: 30px;
            font-weight: 400;
        }

        /* Active Countdown Grid */
        .countdown-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 25px 0;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--kitty-dark-pink);
            border-radius: 12px;
            padding: 15px 5px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .time-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent, rgba(253, 224, 71, 0.1));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .time-box:hover {
            transform: translateY(-5px);
            border-color: var(--bat-yellow);
        }

        .time-box:hover::before {
            opacity: 1;
        }

        .time-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--bat-yellow);
            display: block;
            text-shadow: 0 0 10px rgba(253, 224, 71, 0.3);
        }

        .time-label {
            font-size: 0.75rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Message Box */
        .message-box {
            background: rgba(255, 183, 197, 0.1);
            border-left: 5px solid var(--kitty-dark-pink);
            border-right: 5px solid var(--bat-yellow);
            padding: 25px;
            border-radius: 10px;
            margin-top: 30px;
            color: var(--text-light);
            line-height: 1.6;
            font-size: 1.05rem;
            position: relative;
        }

        /* Dynamic Action Button */
        .surprise-btn {
            background: linear-gradient(45deg, var(--kitty-dark-pink), var(--bat-yellow));
            color: var(--bat-black);
            font-weight: bold;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .surprise-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 0 25px var(--bat-yellow), 0 0 15px var(--kitty-dark-pink);
        }

        .surprise-btn:active {
            transform: scale(0.98);
        }

        /* Floating particles styling */
        .floating-item {
            position: absolute;
            bottom: -50px;
            pointer-events: none;
            z-index: 2;
            animation: floatUp 6s linear forwards;
            font-size: 2rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: translateY(-50vh) translateX(50px) rotate(180deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-110vh) translateX(-20px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="mashup-header">
            <div class="center-logo" id="logo" onclick="toggleLogo()">🦇</div>
        </div>
        
        <h1>Happy Birthday, Aniq!</h1>
        <h2>My Favorite Batman & Hello Kitty Mashup 💖</h2>

        <div class="countdown-container">
            <div class="time-box">
                <span class="time-number" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-box">
                <span class="time-number" id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="time-box">
                <span class="time-number" id="minutes">00</span>
                <span class="time-label">Mins</span>
            </div>
            <div class="time-box">
                <span class="time-number" id="seconds">00</span>
                <span class="time-label">Secs</span>
            </div>
        </div>

        <div class="message-box" id="message-container">
            "To the hero who protects my heart like Batman protects Gotham, but is as soft and lovable as Hello Kitty. Click the logo or the action button below for a surprise!"
        </div>

        <button class="surprise-btn" onclick="triggerSurprise()">Activate Birthday Power! ✨</button>
    </div>

    <script>
        // Target Date: June 20th
        const currentYear = new Date().getFullYear();
        let targetDate = new Date(`June 20, ${currentYear} 00:00:00`).getTime();
        
        // If June 20th has already passed this year, countdown to next year
        if (new Date().getTime() > targetDate) {
            targetDate = new Date(`June 20, ${currentYear + 1} 00:00:00`).getTime();
        }

        // Live Countdown Functionality
        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = d < 10 ? '0' + d : d;
            document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
            document.getElementById('minutes').innerText = m < 10 ? '0' + m : m;
            document.getElementById('seconds').innerText = s < 10 ? '0' + s : s;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // Logo click interactive switch
        function toggleLogo() {
            const logo = document.getElementById('logo');
            if (logo.innerText === '🦇') {
                logo.innerText = '🎀';
                spawnParticles('🎀', 5);
            } else {
                logo.innerText = '🦇';
                spawnParticles('🦇', 5);
            }
        }

        // Active Element Spawner (Floating Kitty & Batman items)
        function spawnParticles(emoji, count) {
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.classList.add('floating-item');
                particle.innerText = emoji;
                
                // Randomizing horizontal position, animation speed, and sizing
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's'; 
                particle.style.fontSize = (Math.random() * 1.5 + 1.5) + 'rem';
                
                document.body.appendChild(particle);

                // Clear DOM after finish
                setTimeout(() => {
                    particle.remove();
                }, 6000);
            }
        }

        // Ambient background activity (Subtle random spawns)
        setInterval(() => {
            const items = ['🦇', '🎀', '🖤', '🌸', '🎂'];
            const randomItem = items[Math.floor(Math.random() * items.length)];
            spawnParticles(randomItem, 1);
        }, 1500);

        // Main Surprise Click Action
        const specialMessages = [
            "Aniq, you're the Dark Knight to my pink aesthetic! 🖤🌸",
            "Gotham is safe, but my heart is taken by you! 🥰",
            "Sending you endless hugs, bows, and batarangs! 🎀🦇",
            "Counting down every second until we celebrate YOU! 🎉"
        ];
        let currentMsgIndex = 0;

        function triggerSurprise() {
            // Burst particles
            spawnParticles('🦇', 8);
            spawnParticles('🎀', 8);
            spawnParticles('🎉', 5);

            // Change messaging interactively on click
            const msgBox = document.getElementById('message-container');
            msgBox.style.transform = 'scale(0.95)';
            setTimeout(() => {
                msgBox.innerText = `"${specialMessages[currentMsgIndex]}"`;
                msgBox.style.transform = 'scale(1)';
                currentMsgIndex = (currentMsgIndex + 1) % specialMessages.length;
            }, 1500;
        }
    </script>
</body>
</html>
